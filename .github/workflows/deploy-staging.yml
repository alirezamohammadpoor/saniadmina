name: Deploy theme (staging)

# Prerequisites:
# - shopify.theme.toml has `[environments.staging]` with `store` and `theme` set
# - Repo secret SHOPIFY_CLI_THEME_TOKEN contains a Theme Access password
#   generated via the "Theme Access" Shopify app

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: shopify-theme-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: shopify-staging
    env:
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push to staging theme
        # --nodelete preserves config/settings_data.json edits made in the admin
        run: shopify theme push -e staging --nodelete --json
