name: Test

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        # --frozen-lockfile omitted intentionally: bun.lock is generated on macOS
        # and does not include linux-specific rollup native binaries. Plain
        # `bun install` still respects locked versions and resolves the missing
        # platform optional deps on linux CI.
        run: bun install

      - name: Run Tier 1+2 tests (Vitest)
        run: bun run test
